server:
  port: 8080

spring:
  application:
    name: alipay-mcp-sample
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-openai-api-key}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}

# 支付宝 MCP 配置
alipay:
  mcp:
    enabled: true
    app-id: 2021006141677002
    private-key: ${ALIPAY_PRIVATE_KEY}
    sse-endpoint: https://opengw.alipay.com/api/v1/open/mcps/aidata-convenience-life5/sse

# 日志配置
logging:
  level:
    com.alipay.mcp.springai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"