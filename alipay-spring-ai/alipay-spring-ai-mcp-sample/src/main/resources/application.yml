server:
  port: 8080

spring:
  application:
    name: alipay-mcp-sample
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-openai-api-key}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}

# 支付宝 MCP 配置
alipay:
  mcp:
    enabled: true
    app-id: 2021006141677002
    private-key: ${ALIPAY_PRIVATE_KEY}

    # 传输模式：sse 或 streamable
    transport-mode: sse

    # SSE 模式配置
    sse-endpoint: https://opengw.alipay.com/api/v1/open/mcps/aidata-convenience-life5/sse

    # Streamable 模式配置（当 transport-mode=streamable 时使用）
    streamable-endpoint: https://opengw-pre.alipay.com/api/v1/open/mcps/aidata-convenience-life5/mcp

    # 简化配置方式（可选，自动构建端点）
    # base-uri: https://opengw.alipay.com
    # mcp-name: aidata-convenience-life5

# 日志配置
logging:
  level:
    com.alipay.mcp.springai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"