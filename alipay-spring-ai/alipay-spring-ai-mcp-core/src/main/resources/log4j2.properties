# Log4j2 配置
status = WARN
name = AlipaySpringAiMcpConfig

# 日志目录：相对于 alipay-spring-ai 项目
property.baseDir = ${sys:user.dir}
property.logDir = ${baseDir}/logs

# 控制台 Appender
appender.console.type = Console
appender.console.name = Console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n

# 文件 Appender
appender.file.type = RollingFile
appender.file.name = File
appender.file.fileName = ${logDir}/mcp-sdk.log
appender.file.filePattern = ${logDir}/mcp-sdk-%d{yyyy-MM-dd}-%i.log
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n
appender.file.policies.type = Policies
appender.file.policies.time.type = TimeBasedTriggeringPolicy
appender.file.policies.time.interval = 1
appender.file.policies.time.modulate = true
appender.file.policies.size.type = SizeBasedTriggeringPolicy
appender.file.policies.size.size = 100MB
appender.file.strategy.type = DefaultRolloverStrategy
appender.file.strategy.max = 30

# MCP SDK Logger - com.alipay.mcp.springai
logger.mcp.name = com.alipay.mcp
logger.mcp.level = DEBUG
logger.mcp.additivity = false
logger.mcp.appenderRefs = console,file
logger.mcp.appenderRef.console.ref = Console
logger.mcp.appenderRef.file.ref = File

# OkHttp Logger
logger.okhttp.name = okhttp3
logger.okhttp.level = WARN

# Root Logger
rootLogger.level = INFO
rootLogger.appenderRefs = console,file
rootLogger.appenderRef.console.ref = Console
rootLogger.appenderRef.file.ref = File