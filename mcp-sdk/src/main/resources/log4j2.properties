# Log4j2 配置
status = WARN
name = McpSdkConfig
property.logDir = logs
property.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n

# 控制台 Appender
appender.console.type = Console
appender.console.name = Console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = ${pattern}

# 文件 Appender
appender.file.type = RollingFile
appender.file.name = File
appender.file.fileName = ${logDir}/mcp-sdk.log
appender.file.filePattern = ${logDir}/mcp-sdk-%d{yyyy-MM-dd}-%i.log
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = ${pattern}
appender.file.policies.type = Policies
appender.file.policies.time.type = TimeBasedTriggeringPolicy
appender.file.policies.time.interval = 1
appender.file.policies.time.modulate = true
appender.file.policies.size.type = SizeBasedTriggeringPolicy
appender.file.policies.size.size = 100MB
appender.file.strategy.type = DefaultRolloverStrategy
appender.file.strategy.max = 30

# 错误日志 Appender
appender.error.type = RollingFile
appender.error.name = ErrorFile
appender.error.fileName = ${logDir}/mcp-sdk-error.log
appender.error.filePattern = ${logDir}/mcp-sdk-error-%d{yyyy-MM-dd}-%i.log
appender.error.layout.type = PatternLayout
appender.error.layout.pattern = ${pattern}
appender.error.filter.type = ThresholdFilter
appender.error.filter.level = ERROR
appender.error.policies.type = Policies
appender.error.policies.time.type = TimeBasedTriggeringPolicy
appender.error.policies.time.interval = 1
appender.error.policies.time.modulate = true
appender.error.policies.size.type = SizeBasedTriggeringPolicy
appender.error.policies.size.size = 100MB
appender.error.strategy.type = DefaultRolloverStrategy
appender.error.strategy.max = 30

# MCP SDK Logger
logger.mcp.name = com.alipay.mcp
logger.mcp.level = DEBUG
logger.mcp.additivity = false
logger.mcp.appenderRefs = console,file,error
logger.mcp.appenderRef.console.ref = Console
logger.mcp.appenderRef.file.ref = File
logger.mcp.appenderRef.error.ref = ErrorFile

# OkHttp Logger
logger.okhttp.name = okhttp3
logger.okhttp.level = WARN

# Root Logger
rootLogger.level = INFO
rootLogger.appenderRefs = console,file
rootLogger.appenderRef.console.ref = Console
rootLogger.appenderRef.file.ref = File